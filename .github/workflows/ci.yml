name: CI Audit Check Sequence

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Code Quality and Lint Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Clone Repository
      uses: actions/checkout@v5

    - name: Verify Environment Setup Script
      run: |
        chmod +x scripts/setup.sh
        ./scripts/setup.sh --diagnose

    - name: ShellCheck Bash Utilities
      run: |
        sudo apt-get install -y shellcheck
        shellcheck scripts/port_scanner.sh
        shellcheck scripts/permission_audit.sh

    - name: Setup Python Runtime
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Run Python Unit Tests
      run: |
        python -m unittest discover -s tests -p "test_*.py"

    - name: Run Bash Script Integration Tests
      run: |
        chmod +x tests/test_scripts.sh
        ./tests/test_scripts.sh
