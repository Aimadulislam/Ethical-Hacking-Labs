<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Shield Border Gradient -->
    <linearGradient id="shield-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="40%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>

    <!-- Core Glowing Cyan Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>

    <!-- Drop Shadow Filter for Glow Effects -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#cyber-grid)" opacity="0.7"/>

  <!-- Center Shield Group -->
  <g transform="translate(0, 0)">
    <!-- Outer Shield Shadow -->
    <path d="M 400 120 L 620 220 L 620 480 C 620 620 400 700 400 700 C 400 700 180 620 180 480 L 180 220 Z" 
          fill="none" stroke="#0ea5e9" stroke-width="16" opacity="0.15" filter="url(#neon-glow)"/>

    <!-- Main Shield Frame -->
    <path d="M 400 130 L 600 220 L 600 470 C 600 600 400 670 400 670 C 400 670 200 600 200 470 L 200 220 Z" 
          fill="#1e293b" fill-opacity="0.85" stroke="url(#shield-border)" stroke-width="8" stroke-linejoin="round"/>

    <!-- Inside Decorative Tech Line -->
    <path d="M 400 160 L 570 240 L 570 450 C 570 560 400 620 400 620 C 400 620 230 560 230 450 L 230 240 Z" 
          fill="none" stroke="#475569" stroke-width="3" stroke-dasharray="10 15"/>

    <!-- Cyber Terminal Code Core -->
    <g transform="translate(270, 280)">
      <!-- Terminal Prompt (>) -->
      <path d="M 30 40 L 90 90 L 30 140" fill="none" stroke="url(#glow-grad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)"/>
      
      <!-- Flashing Cursor Block -->
      <line x1="120" y1="140" x2="190" y2="140" stroke="#38bdf8" stroke-width="18" stroke-linecap="round" filter="url(#neon-glow)">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Node Network Connectors on Outer Shield Points -->
    <circle cx="400" cy="130" r="10" fill="#38bdf8" filter="url(#neon-glow)"/>
    <circle cx="600" cy="220" r="10" fill="#38bdf8"/>
    <circle cx="200" cy="220" r="10" fill="#38bdf8"/>
    <circle cx="600" cy="470" r="10" fill="#0284c7"/>
    <circle cx="200" cy="470" r="10" fill="#0284c7"/>
    <circle cx="400" cy="670" r="10" fill="#0ea5e9" filter="url(#neon-glow)"/>

    <!-- Text Branding Under Shield -->
    <text x="400" y="750" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="4">
      SECURE_SANDBOX
    </text>
    <text x="400" y="780" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="6">
      EDUCATION &amp; DEFENSIBILITY
    </text>
  </g>
</svg>
