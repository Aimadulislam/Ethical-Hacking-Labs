<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Core Glowing Cyan Gradient -->
    <linearGradient id="fav-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="fav-neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background Shield Form -->
  <path d="M 64 12 L 108 30 L 108 72 C 108 96 64 112 64 112 C 64 112 20 96 20 72 L 20 30 Z" 
        fill="#0f172a" stroke="url(#fav-glow-grad)" stroke-width="6" stroke-linejoin="round"/>
  <!-- Cyber Prompt symbol -->
  <path d="M 46 44 L 68 64 L 46 84" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fav-neon-glow)"/>
  <!-- Cursor Block -->
  <line x1="78" y1="84" x2="90" y2="84" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
</svg>
